name: Citation Tracker

on:
  schedule:
    # Runs every Monday at 06:00 UTC. Adjust as you like.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit output files back

jobs:
  track-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests matplotlib openpyxl

      - name: Run citation tracker
        run: python citation_tracker.py

      - name: Commit and push updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update citation tracker output ($(date -u +'%Y-%m-%d'))"
            git push
          fi